<!DOCTYPE html>
<html>

<head>
  <title>AR - Susuwatari</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  <script>
    // Lógica para interactividad y eventos
    AFRAME.registerComponent('ar-logic', {
      init: function () {
        const marker = document.querySelector('a-marker');
        const content = document.querySelector('#main-content');
        
        // Usamos una melodía de piano muy ligera y fiable
        const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        audio.loop = true;
        audio.volume = 0; // Empezamos en silencio absoluto

        const startAudioSystem = () => {
          audio.play().then(() => {
            console.log("Sistema de audio activo (silenciado)");
          }).catch(e => console.error("Error audio:", e));
          window.removeEventListener('click', startAudioSystem);
          window.removeEventListener('touchstart', startAudioSystem);
        };

        // Activamos el motor de audio con el primer toque
        window.addEventListener('click', startAudioSystem);
        window.addEventListener('touchstart', startAudioSystem);

        marker.addEventListener('markerFound', () => {
          content.setAttribute('animation__appear', {
            property: 'scale', from: '0 0 0', to: '1 1 1',
            dur: 800, easing: 'easeOutElastic'
          });
          // En lugar de play(), solo subimos el volumen
          audio.volume = 1;
        });

        marker.addEventListener('markerLost', () => {
          content.setAttribute('scale', '0 0 0');
          // Bajamos el volumen al perder el marcador
          audio.volume = 0;
        });
      }
    });
  </script>
</head>

<body style="margin:0;overflow:hidden;">
  <!-- Pequeño aviso para activar audio si no ha habido interacción -->
  <div id="audio-prompt" style="position: fixed; top: 10px; left: 10px; z-index: 9999; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; font-family: sans-serif; pointer-events: none;">
    Toca la pantalla para activar la música 🎵
  </div>
  <script>
    window.addEventListener('click', () => {
      document.getElementById('audio-prompt').style.display = 'none';
    }, { once: true });
  </script>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" ar-logic vr-mode-ui="enabled: false">
    
    <a-assets>
      <!-- Los assets se cargan vía JS para mayor control -->
    </a-assets>

    <a-light type="ambient" color="#fff" intensity="0.7"></a-light>
    <a-light type="point" intensity="1.5" position="1 2 1" color="#fff"></a-light>

    <a-marker type="pattern" url="pattern-SR.patt">
      
      <a-entity id="main-content" scale="0 0 0">
        <a-circle position="0 0.01 0" radius="0.3" color="#000" opacity="0.2" rotation="-90 0 0"></a-circle>

        <!-- Susuwatari: Animación definida en HTML para que se repita en cada click -->
        <a-entity id="susuwatari" class="clickable"
          animation__jump="property: position; from: 0 0 0; to: 0 0.5 0; dur: 300; dir: alternate; loop: 2; startEvents: click; easing: easeOutQuad">
          
          <a-sphere class="clickable" position="0 0.32 0" radius="0.3" color="#0d0d0d"
            animation__bounce="property:position; from:0 0.30 0; to:0 0.35 0; dir:alternate; loop:true; dur:400; easing:easeInOutSine">
          </a-sphere>

          <!-- Ojos -->
          <a-sphere class="clickable" position="-0.11 0.36 0.26" radius="0.095" color="white"></a-sphere>
          <a-sphere class="clickable" position="0.11 0.36 0.26" radius="0.095" color="white"></a-sphere>
          
          <!-- Resto del cuerpo... -->

          <a-sphere position="-0.10 0.36 0.34" radius="0.062" color="#080808"></a-sphere>
          <a-sphere position="-0.08 0.38 0.37" radius="0.022" color="white"></a-sphere>
          <a-sphere position="0.12 0.36 0.34" radius="0.062" color="#080808"></a-sphere>
          <a-sphere position="0.14 0.38 0.37" radius="0.022" color="white"></a-sphere>
          
          <!-- Pinchos y extremidades -->
          <a-sphere position="0.27 0.32 0" radius="0.09" color="#111"></a-sphere>
          <a-sphere position="-0.27 0.32 0" radius="0.09" color="#111"></a-sphere>
          <a-sphere position="0.23 0.46 0.05" radius="0.08" color="#0f0f0f"></a-sphere>
          <a-sphere position="-0.23 0.46 0.05" radius="0.08" color="#0f0f0f"></a-sphere>
          <a-sphere position="0.2 0.17 0.08" radius="0.08" color="#111"></a-sphere>
          <a-sphere position="-0.2 0.17 0.08" radius="0.08" color="#111"></a-sphere>
          <a-sphere position="0.07 0.57 0.05" radius="0.08" color="#0d0d0d"></a-sphere>
          <a-sphere position="-0.07 0.57 0.05" radius="0.08" color="#0d0d0d"></a-sphere>
          <a-sphere position="0 0.09 0.18" radius="0.07" color="#111"></a-sphere>
          <a-sphere position="0.17 0.32 0.22" radius="0.07" color="#0f0f0f"></a-sphere>
          <a-sphere position="-0.17 0.32 0.22" radius="0.07" color="#0f0f0f"></a-sphere>
          <a-sphere position="0 0.32 -0.25" radius="0.08" color="#111"></a-sphere>

          <a-cylinder position="-0.32 0.38 0.08" radius="0.018" height="0.22" color="#0a0a0a"
            animation="property:rotation; from:0 0 25; to:0 0 55; dir:alternate; loop:true; dur:500"></a-cylinder>
          <a-cylinder position="0.32 0.38 0.08" radius="0.018" height="0.22" color="#0a0a0a"
            animation="property:rotation; from:0 0 -25; to:0 0 -55; dir:alternate; loop:true; dur:500"></a-cylinder>

          <a-cylinder position="-0.12 0.05 0" radius="0.018" height="0.16" color="#0a0a0a"
            animation="property:rotation; from:-25 0 0; to:25 0 0; dir:alternate; loop:true; dur:220"></a-cylinder>
          <a-cylinder position="0.12 0.05 0" radius="0.018" height="0.16" color="#0a0a0a"
            animation="property:rotation; from:25 0 0; to:-25 0 0; dir:alternate; loop:true; dur:220"></a-cylinder>
        </a-entity>

      <a-entity position="0.44 0.44 0.08"
        animation__pop="property:scale; from:0 0 0; to:1 1 1; delay:800; dur:600; easing:easeOutElastic"
        animation__float="property:position; from:0.44 0.44 0.08; to:0.44 0.52 0.08; dir:alternate; loop:true; dur:1100; easing:easeInOutSine">
        <a-cylinder position="0 -0.1 0" radius="0.012" height="0.2" color="#2e7d32"></a-cylinder>
        <a-sphere position="0 0.04 0" radius="0.07" color="#e53935" scale="1 0.7 1"></a-sphere>
        <a-sphere position="0.06 0.06 0" radius="0.05" color="#ef5350" scale="1 0.6 1"></a-sphere>
        <a-sphere position="-0.06 0.06 0" radius="0.05" color="#ef5350" scale="1 0.6 1"></a-sphere>
        <a-sphere position="0 0.06 0.06" radius="0.05" color="#e53935" scale="1 0.6 1"></a-sphere>
        <a-sphere position="0 0.1 0" radius="0.035" color="#b71c1c"></a-sphere>
      </a-entity>

      <a-plane position="0 1.6 -0.01" width="1.2" height="0.22" color="#880044" opacity="0.3"></a-plane>
      <a-text value="Quieres ser" position="0 1.6 0.02" align="center" color="#ffffff" width="3.2"></a-text>

      <a-plane position="0 1.15 -0.01" width="1.0" height="0.22" color="#880044" opacity="0.3"></a-plane>
      <a-text value="mi novia" position="0 1.15 0.02" align="center" color="#FFE600" width="3.4"></a-text>

      <a-plane position="0 0.68 -0.01" width="1.3" height="0.26" color="#cc0033" opacity="0.3"></a-plane>
      <a-text value="SANDY?" position="0 0.68 0.02" align="center" color="#ffffff" width="4.0"
        animation__pulse="property:scale; from:1 1 1; to:1.2 1.2 1.2; dir:alternate; loop:true; dur:650">
      </a-text>

      </a-entity> <!-- Cierre de main-content -->

    </a-marker>
    <a-entity camera>
       <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
    </a-entity>
  </a-scene>
</body>

</html>
