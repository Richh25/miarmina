<!DOCTYPE html>
<html>
<head>
  <title>AR - Susuwatari</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
<a-scene embedded arjs="sourceType: webcam;">
  <a-assets>
    <a-asset-item id="susuwatari" src="scene.gltf"></a-asset-item>
  </a-assets>

  <a-marker type="pattern" url="pattern-SR.patt">

    <a-entity
      gltf-model="#susuwatari"
      position="0 0 0"
      scale="0.5 0.5 0.5"
      animation-mixer
      animation__walk="property: position;
        from: -0.4 0 0; to: 0.4 0 0;
        dir: alternate; loop: true;
        dur: 2500; easing: easeInOutSine"
      animation__rotate="property: rotation;
        from: 0 -90 0; to: 0 90 0;
        dir: alternate; loop: true;
        dur: 2500; easing: easeInOutSine">
    </a-entity>

    <a-text value="¿Quieres ser"
      position="0 1.2 0" align="center"
      color="#FF69B4" width="2.5" opacity="0"
      animation__aparecer="property: opacity;
        from: 0; to: 1; delay: 800; dur: 1000"
      animation__flotar="property: position;
        from: 0 1.2 0; to: 0 1.3 0;
        dir: alternate; loop: true; dur: 1200">
    </a-text>

    <a-text value="mi novia"
      position="0 1.0 0" align="center"
      color="#FF1493" width="2.8" opacity="0"
      animation__aparecer="property: opacity;
        from: 0; to: 1; delay: 1200; dur: 1000"
      animation__flotar="property: position;
        from: 0 1.0 0; to: 0 1.1 0;
        dir: alternate; loop: true; dur: 1200">
    </a-text>

    <a-text value="ARMIÑA ?"
      position="0 0.78 0" align="center"
      color="#FF0066" width="3.2" opacity="0"
      animation__aparecer="property: opacity;
        from: 0; to: 1; delay: 1600; dur: 1000"
      animation__flotar="property: position;
        from: 0 0.78 0; to: 0 0.88 0;
        dir: alternate; loop: true; dur: 1200"
      animation__pulso="property: scale;
        from: 1 1 1; to: 1.15 1.15 1.15;
        dir: alternate; loop: true; dur: 800">
    </a-text>

    <a-text value="♥" position="-0.65 1.0 0"
      color="#FF69B4" width="1.5" align="center" opacity="0"
      animation__aparecer="property: opacity;
        from: 0; to: 0.9; delay: 2000; dur: 600"
      animation__latir="property: scale;
        from: 1 1 1; to: 1.4 1.4 1.4;
        dir: alternate; loop: true; dur: 550">
    </a-text>

    <a-text value="♥" position="0.65 1.0 0"
      color="#FF69B4" width="1.5" align="center" opacity="0"
      animation__aparecer="property: opacity;
        from: 0; to: 0.9; delay: 2200; dur: 600"
      animation__latir="property: scale;
        from: 1.4 1.4 1.4; to: 1 1 1;
        dir: alternate; loop: true; dur: 550">
    </a-text>

  </a-marker>
  <a-entity camera></a-entity>
</a-scene>
</body>
</html>
